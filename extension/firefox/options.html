<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>LeetDrill — Options</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 420px;
        margin: 1.5rem auto;
        padding: 0 1rem;
      }
      h1 { font-size: 16px; }
      label { display: block; margin: 12px 0 4px; font-size: 13px; }
      input, textarea {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid #cbd5e1;
        border-radius: 4px;
        font-size: 13px;
        box-sizing: border-box;
      }
      textarea {
        min-height: 70px;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
      }
      button {
        margin-top: 12px;
        padding: 8px 12px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
      }
      .hint { font-size: 11px; color: #64748b; margin-top: 4px; }
      .status { margin-top: 12px; font-size: 13px; }
      .ok { color: #15803d; }
      .bad { color: #b91c1c; }
    </style>
  </head>
  <body>
    <h1>LeetDrill connection</h1>
    <p class="hint">
      Zen/Firefox uses the code method. Open the code page, sign in if asked,
      copy the manual code, then paste it here.
    </p>
    <label for="backend">Backend URL</label>
    <input id="backend" type="text" placeholder="https://abhiy.xyz/leetdrill" />

    <button id="codePage">open code page</button>
    <button id="openApp">open LeetDrill</button>
    <button id="testConnection">test connection</button>
    <button id="save">save url only</button>

    <label for="manualToken">Manual code</label>
    <textarea id="manualToken" placeholder="paste code from LeetDrill code page"></textarea>
    <button id="saveToken">save manual code</button>

    <div id="status" class="status"></div>
    <p class="hint">
      The Firefox package requests access to abhiy.xyz and leetcode.com. If Zen
      blocks that access, test connection will report it here.
    </p>

    <script src="compat.js"></script>
    <script src="options.js"></script>
  </body>
</html>
