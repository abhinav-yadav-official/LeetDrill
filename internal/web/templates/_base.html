{{define "base"}}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Title}} · LeetDrill</title>
    <meta name="description" content="LeetDrill — daily LeetCode practice with spaced repetition. Track submissions, surface weak problems, and build a consistent review habit.">
    <meta name="keywords" content="LeetDrill, Leet Drill, LeetCode practice, spaced repetition, coding interview prep, algorithm practice, LeetCode tracker">
    <meta name="application-name" content="LeetDrill">
    <meta property="og:site_name" content="LeetDrill">
    <meta property="og:title" content="{{.Title}} · LeetDrill">
    <meta property="og:description" content="Daily LeetCode practice with spaced repetition. Track submissions, surface weak problems, and build a consistent review habit.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{.Title}} · LeetDrill">
    <meta name="twitter:description" content="Daily LeetCode practice with spaced repetition. Track submissions, surface weak problems, and build a consistent review habit.">
    <link rel="icon" href="{{appPath "/favicon.ico"}}">
    <link rel="icon" type="image/svg+xml" href="{{appPath "/favicon.svg"}}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{appPath "/favicon-32.png"}}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{appPath "/apple-touch-icon.png"}}">
    <link rel="stylesheet" href="{{appPath "/themes.css"}}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
    <script src="{{appPath "/theme-loader.js"}}"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root { color-scheme: var(--color-scheme, light); }
      body { background-color: var(--bg-primary); color: var(--text-primary); }
      .bg-zinc-50 { background-color: var(--bg-primary) !important; }
      .bg-white { background-color: var(--bg-secondary) !important; }
      .bg-zinc-100 { background-color: var(--bg-tertiary) !important; }
      .bg-zinc-900 { background-color: var(--bg-inverse) !important; color: var(--text-inverse) !important; }
      .text-zinc-950 { color: var(--text-primary) !important; }
      .text-zinc-900, .text-zinc-800, .text-zinc-700 { color: var(--text-primary) !important; }
      .text-zinc-600, .text-zinc-500 { color: var(--text-secondary) !important; }
      .text-zinc-400 { color: var(--text-muted) !important; }
      .border-zinc-100, .border-zinc-200, .border-zinc-300 { border-color: var(--border-primary) !important; }
      .divide-zinc-100 > :not([hidden]) ~ :not([hidden]), .divide-zinc-200 > :not([hidden]) ~ :not([hidden]) { border-color: var(--border-secondary) !important; }
      .hover\:bg-zinc-50:hover, .hover\:bg-zinc-100:hover { background-color: var(--bg-hover) !important; }
      .hover\:bg-zinc-800:hover { background-color: var(--bg-hover) !important; }
      .bg-sky-50 { background-color: var(--info-bg) !important; }
      .border-sky-200 { border-color: var(--info-border) !important; }
      .text-sky-900 { color: var(--info-text) !important; }
      .bg-emerald-50 { background-color: var(--success-bg) !important; }
      .border-emerald-200 { border-color: var(--success-border) !important; }
      .text-emerald-950, .text-emerald-900, .text-emerald-800 { color: var(--success-text) !important; }
      .rounded-full.bg-emerald-100.text-emerald-800 { background-color: var(--badge-emerald-bg) !important; color: var(--badge-emerald-text) !important; }
      .bg-rose-50 { background-color: var(--error-bg) !important; }
      .border-rose-200 { border-color: var(--error-border) !important; }
      .text-rose-600 { color: var(--error-text) !important; }
      .bg-rose-100.text-rose-800 { background-color: var(--badge-rose-bg) !important; color: var(--badge-rose-text) !important; }
      .bg-sky-100.text-sky-800 { background-color: var(--badge-sky-bg) !important; color: var(--badge-sky-text) !important; }
      .bg-slate-200.text-slate-700 { background-color: var(--badge-slate-bg) !important; color: var(--badge-slate-text) !important; }
      .bg-green-100.text-green-800 { background-color: var(--badge-green-bg) !important; color: var(--badge-green-text) !important; }
      .bg-red-100.text-red-800 { background-color: var(--badge-red-bg) !important; color: var(--badge-red-text) !important; }
      .bg-yellow-100.text-yellow-800 { background-color: var(--badge-yellow-bg) !important; color: var(--badge-yellow-text) !important; }
      input, select, textarea { background-color: var(--input-bg) !important; border-color: var(--input-border) !important; color: var(--text-primary) !important; }
      input::placeholder, textarea::placeholder { color: var(--text-muted) !important; }
      .shadow-sm { box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.35) !important; }
      svg[aria-label="LeetDrill logo"] rect { fill: var(--logo-bg) !important; }
      svg[aria-label="LeetDrill logo"] text { fill: var(--logo-text) !important; }
      .theme-picker-wrap { position: relative; }
      .theme-picker-btn { display: flex; align-items: center; gap: 0.5rem; width: 100%; border-radius: 0.375rem; border: 1px solid var(--border-primary); background-color: var(--bg-secondary); padding: 0.5rem 0.75rem; font-size: 0.75rem; font-weight: 500; color: var(--text-primary); cursor: pointer; }
      .theme-picker-btn:hover { background-color: var(--bg-hover); }
      .theme-picker-menu { position: absolute; top: 100%; left: 0; right: 0; margin-top: 0.25rem; border-radius: 0.375rem; border: 1px solid var(--border-primary); background-color: var(--bg-secondary); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3); overflow: hidden; z-index: 50; max-height: 60vh; overflow-y: auto; }
      .theme-option { display: flex; align-items: center; gap: 0.5rem; width: 100%; padding: 0.5rem 0.75rem; font-size: 0.75rem; color: var(--text-primary); background: none; border: none; cursor: pointer; text-align: left; }
      .theme-option:hover { background-color: var(--bg-hover); }
      .theme-option.active { background-color: var(--bg-tertiary); font-weight: 600; }
      .theme-swatch { display: inline-block; width: 1rem; height: 1rem; border-radius: 9999px; border: 1px solid var(--border-primary); flex-shrink: 0; }
      [x-cloak] { display: none !important; }
      .code-block { background-color: var(--bg-tertiary) !important; border: 1px solid var(--border-primary); border-radius: 0.375rem; overflow-x: auto; }
      .code-block code { font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace; font-size: 0.8125rem; line-height: 1.5; color: var(--text-primary); }
      details.code-details > summary { cursor: pointer; padding: 0.5rem; border-radius: 0.375rem; font-size: 0.8125rem; color: var(--text-secondary); user-select: none; }
      details.code-details > summary:hover { background-color: var(--bg-hover); }
      details.code-details[open] > summary { border-bottom: 1px solid var(--border-primary); margin-bottom: 0; border-radius: 0.375rem 0.375rem 0 0; }
    </style>
  </head>
  <body>
    <div class="flex min-h-screen">
      <aside class="hidden w-56 shrink-0 border-r border-zinc-200 bg-white px-4 py-5 md:block">
        <a href="{{appPath "/"}}" class="flex items-center gap-2 text-lg font-semibold tracking-tight">{{ldLogo}}<span>LeetDrill</span></a>
        <nav class="mt-6 space-y-1 text-sm">
          <a class="{{if eq .NavItem "dashboard"}}bg-zinc-900 text-white{{else}}text-zinc-700 hover:bg-zinc-100{{end}} flex items-center gap-3 rounded-md px-3 py-2" href="{{appPath "/"}}"><i class="ph ph-house"></i> Dashboard</a>
          <a class="{{if eq .NavItem "today"}}bg-zinc-900 text-white{{else}}text-zinc-700 hover:bg-zinc-100{{end}} flex items-center gap-3 rounded-md px-3 py-2" href="{{appPath "/session/today"}}"><i class="ph ph-calendar-check"></i> Today</a>
          <a class="{{if eq .NavItem "lists"}}bg-zinc-900 text-white{{else}}text-zinc-700 hover:bg-zinc-100{{end}} flex items-center gap-3 rounded-md px-3 py-2" href="{{appPath "/lists"}}"><i class="ph ph-list-bullets"></i> Lists</a>
          <a class="{{if eq .NavItem "problems"}}bg-zinc-900 text-white{{else}}text-zinc-700 hover:bg-zinc-100{{end}} flex items-center gap-3 rounded-md px-3 py-2" href="{{appPath "/problems"}}"><i class="ph ph-code-block"></i> Problems</a>
          <a class="{{if eq .NavItem "patterns"}}bg-zinc-900 text-white{{else}}text-zinc-700 hover:bg-zinc-100{{end}} flex items-center gap-3 rounded-md px-3 py-2" href="{{appPath "/patterns"}}"><i class="ph ph-shapes"></i> Patterns</a>
          <a class="{{if eq .NavItem "stats"}}bg-zinc-900 text-white{{else}}text-zinc-700 hover:bg-zinc-100{{end}} flex items-center gap-3 rounded-md px-3 py-2" href="{{appPath "/stats"}}"><i class="ph ph-chart-bar"></i> Stats</a>
          <a class="{{if eq .NavItem "settings"}}bg-zinc-900 text-white{{else}}text-zinc-700 hover:bg-zinc-100{{end}} flex items-center gap-3 rounded-md px-3 py-2" href="{{appPath "/settings"}}"><i class="ph ph-gear"></i> Settings</a>
          <a class="flex items-center gap-3 rounded-md px-3 py-2 text-zinc-700 hover:bg-zinc-100" href="https://abhiyadav.in/shared/leetdrill-extension/" target="_blank" rel="noopener"><i class="ph ph-puzzle-piece"></i> Extension</a>
        </nav>
        <div class="theme-picker-wrap mt-6" x-data="{ open: false }">
          <button type="button" @click="open = !open" @click.away="open = false" data-theme-toggle class="theme-picker-btn" aria-label="Theme: System">
            <i class="ph ph-palette"></i>
            <span class="flex-1 text-left">Theme</span>
            <span data-theme-label class="text-xs" style="color:var(--text-muted)">System</span>
            <i class="ph ph-caret-up" :class="{ 'rotate-180': open }" style="transition: transform 0.2s;"></i>
          </button>
          <div class="theme-picker-menu" x-show="open" x-cloak>
            <button type="button" class="theme-option" @click="leetdrillTheme.set('system'); open = false" :class="{ 'active': document.documentElement.dataset.theme === 'system' || document.documentElement.dataset.theme === 'light' || document.documentElement.dataset.theme === 'dark' }"><span class="theme-swatch" style="background:conic-gradient(#faf3e8 0deg 180deg,#2e3440 180deg 360deg)"></span> System</button>
            <button type="button" class="theme-option" @click="leetdrillTheme.set('light'); open = false" :class="{ 'active': document.documentElement.dataset.theme === 'light' }"><span class="theme-swatch" style="background:#faf3e8;border-color:#dcccb4"></span> Light</button>
            <button type="button" class="theme-option" @click="leetdrillTheme.set('dark'); open = false" :class="{ 'active': document.documentElement.dataset.theme === 'dark' }"><span class="theme-swatch" style="background:#2e3440"></span> Dark</button>
            <button type="button" class="theme-option" @click="leetdrillTheme.set('high-contrast'); open = false" :class="{ 'active': document.documentElement.dataset.theme === 'high-contrast' }"><span class="theme-swatch" style="background:#ffffff;border-color:#000000"></span> High Contrast</button>
            <button type="button" class="theme-option" @click="leetdrillTheme.set('night'); open = false" :class="{ 'active': document.documentElement.dataset.theme === 'night' }"><span class="theme-swatch" style="background:#000000;border:2px solid #333"></span> Night</button>
            <div class="border-t border-zinc-200 my-1 mx-3"></div>
            <button type="button" class="theme-option" @click="leetdrillTheme.set('dracula'); open = false" :class="{ 'active': document.documentElement.dataset.theme === 'dracula' }"><span class="theme-swatch" style="background:#282a36"></span> Dracula</button>
            <button type="button" class="theme-option" @click="leetdrillTheme.set('solarized'); open = false" :class="{ 'active': document.documentElement.dataset.theme === 'solarized' }"><span class="theme-swatch" style="background:#002b36"></span> Solarized</button>
            <button type="button" class="theme-option" @click="leetdrillTheme.set('catppuccin'); open = false" :class="{ 'active': document.documentElement.dataset.theme === 'catppuccin' }"><span class="theme-swatch" style="background:#1e1e2e"></span> Catppuccin</button>
            <button type="button" class="theme-option" @click="leetdrillTheme.set('tokyo-night'); open = false" :class="{ 'active': document.documentElement.dataset.theme === 'tokyo-night' }"><span class="theme-swatch" style="background:#1a1b26"></span> Tokyo Night</button>
            <button type="button" class="theme-option" @click="leetdrillTheme.set('gruvbox'); open = false" :class="{ 'active': document.documentElement.dataset.theme === 'gruvbox' }"><span class="theme-swatch" style="background:#282828"></span> Gruvbox</button>
          </div>
        </div>
      </aside>
      <main class="min-w-0 flex-1">
        <header class="border-b border-zinc-200 bg-white px-4 py-3 md:hidden">
          <div class="flex items-center justify-between">
            <a href="{{appPath "/"}}" class="flex items-center gap-2 font-semibold">{{ldLogo}}<span>LeetDrill</span></a>
            <div class="flex items-center gap-2">
              <button type="button" data-theme-toggle class="rounded-md border border-zinc-200 bg-white px-3 py-1.5 text-xs font-medium text-zinc-700" aria-label="Theme: System"><i class="ph ph-palette"></i></button>
              <a href="{{appPath "/session/today"}}" class="rounded-md bg-zinc-900 px-3 py-1.5 text-sm font-medium text-white">Today</a>
            </div>
          </div>
        </header>
        <section class="mx-auto max-w-6xl px-4 py-6 sm:px-6 lg:px-8">
          {{template "content" .}}
        </section>
      </main>
    </div>
  </body>
</html>
{{end}}
