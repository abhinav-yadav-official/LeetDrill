<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Abhiy Projects</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #172033;
        background: #f7f8fb;
      }
      body {
        margin: 0;
      }
      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 56px 20px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 36px;
        line-height: 1.12;
      }
      p {
        color: #4b5565;
        font-size: 16px;
        line-height: 1.65;
      }
      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }
      a {
        display: inline-flex;
        align-items: center;
        border: 1px solid #d7deea;
        border-radius: 8px;
        background: #fff;
        color: #0f5bd7;
        font-weight: 600;
        padding: 10px 14px;
        text-decoration: none;
      }
      a:hover {
        border-color: #9ab5e5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Abhiy Projects</h1>
      <p>
        LeetDrill is a focused LeetCode practice tracker for daily sessions,
        solved-problem sync, and review planning.
      </p>
      <div class="links">
        <a href="https://abhiy.xyz/leetdrill">Open LeetDrill</a>
        <a href="https://github.com/abhinav-yadav-official/leetdrill">GitHub</a>
      </div>
    </main>
  </body>
</html>
